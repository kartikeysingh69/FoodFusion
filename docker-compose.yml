services:
  mysql:
    image: mysql:8.0
    container_name: foodfusion-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: foodfusion
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  flask:
    build: ./backend
    container_name: foodfusion-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "5000:5000"

volumes:
  mysql-data: